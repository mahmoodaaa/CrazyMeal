<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crazy Meal - Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Crazy Meal Menu</h1>
    <nav>
      <a href="index.html">Back to Home</a>
    </nav>
  </header>

  <main>
    <section class="menu-items">
      <h2>Our Chicken Specialties</h2>
      <div class="menu-grid">
        <div class="menu-card">
          <img src="images/fried-chicken.jpg" alt="Crispy Fried Chicken">
          <h3>Crispy Fried Chicken</h3>
          <p>$13.99</p>
        </div>

        <div class="menu-card">
          <img src="images/grilled-chicken.jpg" alt="Grilled Chicken">
          <h3>Grilled Chicken</h3>
          <p>$12.99</p>
        </div>

        <div class="menu-card">
          <img src="images/chicken-wings.jpg" alt="Spicy Chicken Wings">
          <h3>Spicy Chicken Wings</h3>
          <p>$10.99</p>
        </div>

        <div class="menu-card">
          <img src="images/chicken-burger.jpg" alt="Chicken Burger">
          <h3>Chicken Burger</h3>
          <p>$15.99</p>
        </div>

        <div class="menu-card">
          <img src="images/chicken-salad.jpg" alt="Chicken Salad">
          <h3>Chicken Salad</h3>
          <p>$9.99</p>
        </div>

        <div class="menu-card">
          <img src="images/chicken-tenders.jpg" alt="Chicken Tenders">
          <h3>Chicken Tenders</h3>
          <p>$11.99</p>
        </div>

        <div class="menu-card">
          <img src="images/hot-honey-chicken.jpg" alt="Spicy Hot-honey-chicken">
          <h3>Chicken Hot Honey</h3>
          <p>$16.99</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="currentYear"></span> Mahmood Aljdayeh 2025</p>
  </footer>
</body>
</html>
