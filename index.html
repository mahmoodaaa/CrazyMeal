<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crazy Meal - HomePage</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Crazy Meal</h1>
    <nav>
      <a href="menu.html">View Menu</a>
    </nav>
  </header>

  <main>
    <section class="order-form">
      <h2>Add New Order</h2>
      <form id="orderForm">
        <div class="form-group">
          <label for="mealName">Meal Name:</label>
          <input type="text" id="mealName" required />
        </div>
        <div class="form-group">
          <label for="mealPrice">Meal Price ($):</label>
          <input type="number" id="mealPrice" min="0" step="0.01" required />
        </div>
        <div class="form-group">
          <label for="mealImage">Meal Image URL:</label>
          <input type="url" id="mealImage" required />
        </div>
        <button type="submit">Add Order</button>
      </form>
    </section>

    <section class="orders-list">
      <h2>Current Orders</h2>
      <div id="ordersContainer"></div>
      <button id="clearOrders" class="clear-btn">Clear All Orders</button>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="currentYear"></span> Mahmood Aljdayeh</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
